{% set name = "snowpark-connect-deps-2" %}
{% set version = "3.56.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: 7e4582d158ddc7f69a630095a34aad7441c6e59ec61a70612d31a162a6636dba

build:
  number: 100
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<310 or py>312]

requirements:
  host:
    - pip
    - python
    - wheel
    - setuptools
  run:
    - python

test:
  imports:
    - snowpark_connect_deps_2
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://pypi.org/project/snowpark-connect-deps-2
  summary: Supporting JAR dependencies for Snowpark Connect (Part 2)
  license: Apache-2.0
  license_family: Apache
  license_file:
    - LICENSE-binary
    - NOTICE-binary
    - LICENSE.txt
  description: |
    Supporting library JAR files for Snowpark Connect. This package contains Scala, Jackson, Commons, and other dependency JARs.
  doc_url: https://pypi.org/project/snowpark-connect-deps-2
  dev_url: https://pypi.org/project/snowpark-connect-deps-2

extra:
  recipe-maintainers:
    - snegireff
